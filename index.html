<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-libreria — Settimana VII Giorno I</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>La mia libreria - esplora Open Library</h1>
      <p>
        Cerca libri reali da Open Library e aggiungili alla tua libreria
        personale.
      </p>
    </header>

    <main class="container">
      <section class="cerca-section">
        <h2 class="fw-bold">Cerca</h2>
        <div class="campo">
          <label for="cerca">Titolo o autore</label>
          <input type="text" id="cerca" placeholder="es. harari, tolkien" />
        </div>

        <div id="spinner" class="spinner" hidden>Caricamento in corso...</div>
        <div id="errore" class="alert alert-danger" hidden></div>

        <ul id="risultati" class="risultati">
          <!-- Popolata da JS -->
        </ul>
      </section>

      <section class="lista-section mt-4">
        <div class="lista-header">
          <h2>I tuoi libri (<span id="contatore">0</span>)</h2>
          <button id="svuota-tutto" class="btn-svuota">Svuota tutto</button>
          <button id="esporta" class="btn-esporta">Esporta</button>
        </div>

        <p class="info-storage">
          I libri sono salvati nel browser e sopravvivono al refresh.
        </p>

        <button class="tutti">Tutti</button>
        <button class="letti">Letti</button>
        <button class="da-leggere">Da leggere</button>

        <ul id="lista-libri">
          <!-- popolato da JavaScript -->
        </ul>
      </section>
    </main>

    <script src="assets/js/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
